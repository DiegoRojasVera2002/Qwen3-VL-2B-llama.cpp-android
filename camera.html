<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#4A90D9">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="manifest" href="manifest.json">
    <title>PathsAI — Camara</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --blue: #4A90D9;
            --orange: #FF9500;
            --green: #34C759;
            --red: #FF3B30;
            --bg: #FFFFFF;
            --surface: #F5F7FA;
            --surface2: #EBEBF0;
            --border: #E5E5EA;
            --text: #1C1C1E;
            --text-secondary: #8E8E93;
            --radius-xl: 24px;
            --radius-lg: 16px;
            --radius-md: 12px;
            --radius-sm: 8px;
            --safe-top: env(safe-area-inset-top, 0px);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        html, body {
            height: 100%;
            background: var(--bg);
            font-family: 'Nunito', sans-serif;
            color: var(--text);
            overscroll-behavior: none;
        }

        body {
            display: flex;
            justify-content: center;
        }

        .screen {
            width: 100%;
            max-width: 412px;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            background: var(--bg);
        }

        /* ── Header ── */
        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: calc(var(--safe-top) + 14px) 20px 14px;
            border-bottom: 1px solid var(--border);
            background: var(--bg);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .back-btn {
            width: 40px;
            height: 40px;
            border-radius: var(--radius-sm);
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--blue);
            font-size: 20px;
            cursor: pointer;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: background 0.1s;
        }
        .back-btn:active { background: var(--surface2); }

        .header-title { flex: 1; }
        .header-title h1 {
            font-size: 18px;
            font-weight: 800;
            color: var(--text);
            letter-spacing: -0.3px;
        }
        .header-title h1 .paths { color: var(--blue); }
        .header-title h1 .ai   { color: var(--orange); }
        .header-title p {
            font-size: 12px;
            color: var(--text-secondary);
            font-weight: 600;
            margin-top: 1px;
        }

        /* ── Video Card ── */
        .video-card {
            margin: 16px 16px 0;
            border-radius: var(--radius-xl);
            overflow: hidden;
            background: #0d0d10;
            position: relative;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            border: 1px solid var(--border);
        }

        #videoFeed {
            display: block;
            width: 100%;
            height: auto;
            aspect-ratio: 4/3;
            object-fit: cover;
        }

        #segCanvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            filter: blur(1.5px);
        }

        #segStatus {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            font-size: 11px;
            font-family: 'Nunito', monospace;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 20px;
            color: #fff;
        }

        #captureCanvas { display: none; }

        /* ── Response Box ── */
        .response-card {
            margin: 14px 16px 0;
            background: var(--surface);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
            border-left: 4px solid var(--blue);
            padding: 14px 16px;
            min-height: 80px;
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }

        .response-icon {
            font-size: 20px;
            flex-shrink: 0;
            margin-top: 1px;
        }

        #responseBox {
            font-size: 14px;
            font-weight: 600;
            line-height: 1.6;
            color: var(--text);
            flex: 1;
        }

        /* ── Controles principales ── */
        .controls-main {
            margin: 14px 16px 0;
            display: flex;
            gap: 12px;
            align-items: center;
        }

        #startButton {
            flex: 1;
            height: 54px;
            border: none;
            border-radius: var(--radius-lg);
            font-family: 'Nunito', sans-serif;
            font-size: 17px;
            font-weight: 800;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.1s;
            letter-spacing: 0.2px;
        }

        #startButton:active { transform: scale(0.97); }

        #startButton.start {
            background: linear-gradient(135deg, var(--green), #28A745);
            color: #fff;
            box-shadow: 0 4px 16px rgba(52,199,89,0.35);
        }

        #startButton.stop {
            background: linear-gradient(135deg, var(--red), #CC2A22);
            color: #fff;
            box-shadow: 0 4px 16px rgba(255,59,48,0.35);
        }

        .interval-pill {
            height: 54px;
            padding: 0 16px;
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: var(--radius-lg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2px;
            cursor: pointer;
        }

        .interval-pill label {
            font-size: 10px;
            font-weight: 700;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: pointer;
        }

        #intervalSelect {
            background: transparent;
            border: none;
            font-family: 'Nunito', sans-serif;
            font-size: 15px;
            font-weight: 800;
            color: var(--text);
            cursor: pointer;
            padding: 0;
            outline: none;
        }

        .tts-pill {
            height: 54px;
            width: 54px;
            border-radius: var(--radius-lg);
            background: var(--surface);
            border: 1.5px solid var(--border);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2px;
            cursor: pointer;
            transition: background 0.1s, border-color 0.1s;
            flex-shrink: 0;
        }

        .tts-pill.active {
            background: #EBF4FF;
            border-color: var(--blue);
        }

        .tts-pill .icon { font-size: 20px; }
        .tts-pill .lbl {
            font-size: 9px;
            font-weight: 800;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.4px;
        }

        .tts-pill.active .lbl { color: var(--blue); }

        /* ── Velocidad TTS ── */
        .tts-rate-row {
            margin: 12px 16px 0;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .tts-rate-row label {
            font-size: 12px;
            font-weight: 700;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.4px;
            flex-shrink: 0;
        }

        .tts-rate-row input[type=range] {
            flex: 1;
            -webkit-appearance: none;
            height: 4px;
            border-radius: 2px;
            background: var(--border);
            outline: none;
        }

        .tts-rate-row input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--blue);
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(74,144,217,0.4);
        }

        .tts-rate-row span {
            font-size: 14px;
            font-weight: 800;
            color: var(--text);
            min-width: 28px;
            text-align: right;
        }

        /* ── Config avanzada ── */
        .settings-section {
            margin: 12px 16px calc(var(--safe-bottom) + 20px);
        }

        .settings-toggle {
            width: 100%;
            background: none;
            border: none;
            border-radius: var(--radius-lg);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-family: 'Nunito', sans-serif;
            font-size: 13px;
            font-weight: 700;
            color: var(--text-secondary);
            background: var(--surface);
            border: 1px solid var(--border);
            transition: background 0.1s;
        }

        .settings-toggle:active { background: var(--surface2); }
        .settings-toggle .arrow { margin-left: auto; transition: transform 0.2s; }
        .settings-toggle.open .arrow { transform: rotate(180deg); }

        .settings-body {
            display: none;
            padding: 16px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-top: none;
            border-radius: 0 0 var(--radius-lg) var(--radius-lg);
            margin-top: -1px;
            flex-direction: column;
            gap: 14px;
        }

        .settings-body.open { display: flex; }

        .field { display: flex; flex-direction: column; gap: 6px; }

        .field label {
            font-size: 12px;
            font-weight: 700;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.4px;
        }

        .field input[type=text],
        .field select,
        .field textarea {
            background: var(--bg);
            border: 1.5px solid var(--border);
            border-radius: var(--radius-md);
            padding: 10px 12px;
            font-family: 'Nunito', sans-serif;
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
            width: 100%;
            outline: none;
            transition: border-color 0.15s;
        }

        .field input[type=text]:focus,
        .field select:focus,
        .field textarea:focus {
            border-color: var(--blue);
        }

        .field textarea {
            height: 140px;
            resize: vertical;
            line-height: 1.5;
            font-size: 12px;
        }

        @media (min-width: 413px) {
            .screen {
                min-height: auto;
                height: 891px;
                border-radius: 44px;
                box-shadow: 0 24px 80px rgba(0,0,0,0.22);
                border: 8px solid #111;
                overflow: hidden;
            }
            body {
                background: #F0F0F0;
                align-items: center;
                min-height: 100vh;
            }
        }
    </style>
</head>
<body>
    <div class="screen">

        <!-- Header -->
        <div class="header">
            <a class="back-btn" href="index.html">&#8592;</a>
            <div class="header-title">
                <h1><span class="paths">Paths</span><span class="ai">AI</span></h1>
                <p>Solo Camara</p>
            </div>
        </div>

        <!-- Video -->
        <div class="video-card">
            <video id="videoFeed" autoplay playsinline muted></video>
            <canvas id="segCanvas"></canvas>
            <div id="segStatus">Cargando segmentador...</div>
        </div>

        <canvas id="captureCanvas"></canvas>

        <!-- Respuesta -->
        <div class="response-card">
            <div class="response-icon">👁️</div>
            <div id="responseBox">Iniciando PathsAI...</div>
        </div>

        <!-- Controles principales -->
        <div class="controls-main">
            <button id="startButton" class="start">Iniciar</button>

            <div class="interval-pill">
                <label for="intervalSelect">Cada</label>
                <select id="intervalSelect">
                    <option value="1000">1 s</option>
                    <option value="2000">2 s</option>
                    <option value="3000">3 s</option>
                    <option value="5000" selected>5 s</option>
                    <option value="10000">10 s</option>
                </select>
            </div>

            <div class="tts-pill active" id="ttsPill">
                <span class="icon">🔊</span>
                <span class="lbl">Voz</span>
                <input type="checkbox" id="ttsEnabled" checked style="display:none">
            </div>
        </div>

        <!-- Velocidad TTS -->
        <div class="tts-rate-row">
            <label>Velocidad</label>
            <input type="range" id="ttsRate" min="0.5" max="2" step="0.1" value="1.2">
            <span id="ttsRateLabel">1.2x</span>
        </div>

        <!-- Config avanzada -->
        <div class="settings-section">
            <button class="settings-toggle" id="settingsToggle">
                <span>⚙️</span>
                <span>Configuracion avanzada</span>
                <span class="arrow">▼</span>
            </button>
            <div class="settings-body" id="settingsBody">
                <div class="field">
                    <label>URL del servidor Qwen</label>
                    <input type="text" id="baseURL" value="http://localhost:8080">
                </div>
                <div class="field">
                    <label>Idioma de voz</label>
                    <select id="ttsLang">
                        <option value="es-MX">Espanol (Mexico)</option>
                        <option value="es-ES">Espanol (Espana)</option>
                        <option value="en-US">English (US)</option>
                    </select>
                </div>
                <div class="field">
                    <label>Prompt de instrucciones</label>
                    <textarea id="instructionText"></textarea>
                </div>
            </div>
        </div>

    </div>

    <script type="module">
        import { ImageSegmenter, FilesetResolver }
            from 'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14';

        // ── Paleta DeepLab v3 — 21 clases Pascal VOC ──────────────────────────
        // prettier-ignore
        const PALETTE = new Uint8ClampedArray([
          //  R    G    B    A
             60,  60, 120,  50,   // 0  background
            220, 120,  80, 145,   // 1  aeroplane
            100, 210, 160, 145,   // 2  bicycle
            240, 190,  80, 145,   // 3  bird
             90, 150, 230, 145,   // 4  boat
            230, 140,  90, 145,   // 5  bottle
            170,  90, 230, 145,   // 6  bus
             90, 200,  90, 145,   // 7  car
            240, 130, 190, 145,   // 8  cat
            200, 200,  80, 145,   // 9  chair
            120, 230, 190, 145,   // 10 cow
            240, 170, 120, 145,   // 11 diningtable
            190, 120, 230, 145,   // 12 dog
            240, 210, 120, 145,   // 13 horse
            120, 200, 240, 145,   // 14 motorbike
            240,  90,  90, 170,   // 15 person
             90, 230, 130, 145,   // 16 pottedplant
            240, 190, 190, 145,   // 17 sheep
            200, 170, 130, 145,   // 18 sofa
            130, 130, 230, 145,   // 19 train
            240, 240, 120, 145,   // 20 tvmonitor
        ]);

        // ── DOM ──────────────────────────────────────────────────────────────
        const video           = document.getElementById('videoFeed');
        const segCanvas       = document.getElementById('segCanvas');
        const captureCanvas   = document.getElementById('captureCanvas');
        const segStatus       = document.getElementById('segStatus');
        const responseBox     = document.getElementById('responseBox');
        const baseURL         = document.getElementById('baseURL');
        const instructionText = document.getElementById('instructionText');
        const intervalSelect  = document.getElementById('intervalSelect');
        const startButton     = document.getElementById('startButton');
        const ttsEnabled      = document.getElementById('ttsEnabled');
        const ttsPill         = document.getElementById('ttsPill');
        const ttsLang         = document.getElementById('ttsLang');
        const ttsRate         = document.getElementById('ttsRate');
        const ttsRateLabel    = document.getElementById('ttsRateLabel');
        const settingsToggle  = document.getElementById('settingsToggle');
        const settingsBody    = document.getElementById('settingsBody');

        // ── Accordeon de ajustes ─────────────────────────────────────────────
        settingsToggle.addEventListener('click', () => {
            const open = settingsBody.classList.toggle('open');
            settingsToggle.classList.toggle('open', open);
        });

        // ── TTS pill toggle ──────────────────────────────────────────────────
        ttsPill.addEventListener('click', () => {
            ttsEnabled.checked = !ttsEnabled.checked;
            ttsPill.classList.toggle('active', ttsEnabled.checked);
        });

        // ── Estado ───────────────────────────────────────────────────────────
        let stream         = null;
        let isProcessing   = false;
        let qwenIntervalId = null;
        let segLoopActive  = false;
        let imageSegmenter = null;
        let lastVideoTime  = -1;
        let frameCount     = 0;
        let fpsTimer       = performance.now();

        const tmpCanvas = document.createElement('canvas');
        const tmpCtx    = tmpCanvas.getContext('2d');

        // ── Prompt ───────────────────────────────────────────────────────────
        instructionText.value = `<role>
Eres PathsAI, los ojos de una persona con discapacidad visual que camina en tiempo real. Tu unica funcion es describir lo que la camara capta y decirle exactamente que hacer.
</role>

<task>
Analiza la imagen y responde en espanol con DOS partes en este orden exacto:

1. CONTEXTUAL: Describe el entorno real que ves. Menciona el tipo de lugar, lo que hay adelante, obstaculos o personas con posicion (izquierda, derecha, adelante, al centro) y distancia (muy cerca menos de 1m, cerca 1-2m, lejos mas de 3m). Puede ser una o dos frases segun la complejidad de la escena. Si hay peligro inmediato se breve pero NUNCA omitas esta parte.

2. DIRECTA: Separado por un punto, una instruccion corta y accionable de que debe hacer el usuario ahora mismo.
</task>

<examples>
Imagen: pasillo de oficina libre
Salida: "Estas en un pasillo de oficina con paredes a ambos lados y espacio libre al frente. Continua caminando hacia adelante."

Imagen: calle concurrida con semaforo y grupo de personas
Salida: "Hay una multitud de personas reunidas frente a ti cerca del semaforo, a unos dos metros. Detente y espera a que pasen antes de avanzar."

Imagen: sala con silla en el centro
Salida: "Estas en una sala amplia, hay una silla al centro a menos de un metro de ti. Deviate hacia la derecha para rodearla."

Imagen: escaleras descendentes
Salida: "Hay escaleras que bajan justo adelante, el primer escalon esta a menos de un metro. Detente, busca el pasamanos a tu derecha y baja despacio."

Imagen: pasillo con una persona caminando en sentido contrario
Salida: "Hay una persona caminando hacia ti por el centro del pasillo, a unos dos metros. Deviate ligeramente a la derecha para dejarle paso."
</examples>

<rules>
- Responde SIEMPRE en espanol.
- NUNCA escribas en el output palabras como "CONTEXTUAL", "DIRECTA", "1.", "2." ni ningun titulo o etiqueta. Solo texto natural fluido.
- SIEMPRE incluye la parte contextual aunque no haya obstaculos, describe el tipo de lugar y lo que ves.
- NUNCA respondas solo con frases vagas como "sigue adelante" sin describir primero el entorno.
- Maximo 3 frases en total entre las dos partes.
- *** LA INSTRUCCION DIRECTA ES OBLIGATORIA EN CADA RESPUESTA, NUNCA LA OMITAS. Si la olvidas la respuesta es incorrecta. ***
- La instruccion directa siempre debe ser una accion clara basandote en estos ejemplos: "Continua caminando hacia adelante.", "Deviate a la derecha.", "Deviate a la izquierda.", "Detente y espera.", "Baja despacio.", "Sube con cuidado.", "Gira a la izquierda.", "Gira a la derecha." u otras similares segun la situacion.
- NUNCA uses palabras visuales como "observa", "mira", "ve", "fijate", "nota", "puedes ver" ni ninguna que implique vision. El usuario es ciego.
- Si hay textos visibles, letreros, logos, carteles o senales en la imagen, leelos y mencionalos explicitamente en el contextual. Por ejemplo: "Hay un letrero que dice Salida de emergencia a tu derecha." o "Estas frente a una puerta que dice Bano." Esto es importante para que el usuario sepa exactamente donde esta.
- Respuesta concisa y directa, sin introducciones ni explicaciones extra.
</rules>`;

        // ── TTS ──────────────────────────────────────────────────────────────
        ttsRate.addEventListener('input', () => {
            ttsRateLabel.textContent = parseFloat(ttsRate.value).toFixed(1) + 'x';
        });

        setInterval(() => {
            if (window.speechSynthesis.speaking) window.speechSynthesis.resume();
        }, 5000);

        window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();

        function speak(text) {
            if (!ttsEnabled.checked || !text) return;
            window.speechSynthesis.cancel();
            const utt = new SpeechSynthesisUtterance(text);
            utt.lang = ttsLang.value;
            utt.rate = parseFloat(ttsRate.value);
            const voices = window.speechSynthesis.getVoices();
            const match = voices.find(v => v.lang === ttsLang.value)
                       || voices.find(v => v.lang.startsWith(ttsLang.value.split('-')[0]));
            if (match) utt.voice = match;
            utt.onerror = e => console.error('[TTS]', e.error);
            window.speechSynthesis.speak(utt);
        }

        // ── Camara ───────────────────────────────────────────────────────────
        async function initCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: { ideal: 'environment' } },
                    audio: false
                });
                video.srcObject = stream;
                responseBox.textContent = 'Camara lista. Pulsa Iniciar.';
            } catch (err) {
                responseBox.textContent = `Error camara: ${err.message}`;
            }
        }

        function captureDataURL() {
            if (!stream || !video.videoWidth) return null;
            captureCanvas.width  = video.videoWidth;
            captureCanvas.height = video.videoHeight;
            captureCanvas.getContext('2d').drawImage(video, 0, 0);
            return captureCanvas.toDataURL('image/jpeg', 0.75);
        }

        // ── Dibujar mascara ──────────────────────────────────────────────────
        function drawMask(result) {
            const mask = result.categoryMask;
            if (!mask) return;

            const mw   = mask.width;
            const mh   = mask.height;
            const data = mask.getAsUint8Array();

            if (tmpCanvas.width !== mw || tmpCanvas.height !== mh) {
                tmpCanvas.width  = mw;
                tmpCanvas.height = mh;
            }

            const imgData = tmpCtx.createImageData(mw, mh);
            const pix     = imgData.data;

            for (let i = 0; i < data.length; i++) {
                const c      = Math.min(data[i], 20) * 4;
                pix[i * 4]   = PALETTE[c];
                pix[i * 4+1] = PALETTE[c+1];
                pix[i * 4+2] = PALETTE[c+2];
                pix[i * 4+3] = PALETTE[c+3];
            }

            tmpCtx.putImageData(imgData, 0, 0);

            const ctx = segCanvas.getContext('2d');
            ctx.clearRect(0, 0, segCanvas.width, segCanvas.height);
            ctx.imageSmoothingEnabled = true;
            ctx.imageSmoothingQuality = 'medium';
            ctx.drawImage(tmpCanvas, 0, 0, segCanvas.width, segCanvas.height);
        }

        // ── Loop de segmentacion RAF ─────────────────────────────────────────
        function segLoop(timestamp) {
            if (!segLoopActive) return;
            requestAnimationFrame(segLoop);

            if (video.readyState < 2 || video.currentTime === lastVideoTime) return;
            lastVideoTime = video.currentTime;

            imageSegmenter.segmentForVideo(video, timestamp, (result) => {
                drawMask(result);
                result.close();

                frameCount++;
                const now = performance.now();
                if (now - fpsTimer >= 1000) {
                    segStatus.textContent = `${frameCount} FPS`;
                    frameCount = 0;
                    fpsTimer   = now;
                }
            });
        }

        // ── Inferencia Qwen ──────────────────────────────────────────────────
        async function sendToQwen() {
            if (!isProcessing) return;
            const dataURL = captureDataURL();
            if (!dataURL) return;
            try {
                const res = await fetch(`${baseURL.value}/v1/chat/completions`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        max_tokens: 100,
                        messages: [{
                            role: 'user',
                            content: [
                                { type: 'text', text: instructionText.value },
                                { type: 'image_url', image_url: { url: dataURL } }
                            ]
                        }]
                    })
                });
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const data = await res.json();
                const text = data.choices[0].message.content;
                responseBox.textContent = text;
                speak(text);
            } catch (e) {
                responseBox.textContent = `Error Qwen: ${e.message}`;
            }
        }

        // ── Controles ────────────────────────────────────────────────────────
        function handleStart() {
            if (!stream) { alert('Camara no disponible'); return; }
            isProcessing  = true;
            segLoopActive = true;

            segCanvas.width  = video.videoWidth  || 640;
            segCanvas.height = video.videoHeight || 480;

            startButton.textContent = 'Detener';
            startButton.className   = 'stop';

            sendToQwen();
            qwenIntervalId = setInterval(sendToQwen, parseInt(intervalSelect.value));

            if (imageSegmenter) requestAnimationFrame(segLoop);
        }

        function handleStop() {
            isProcessing  = false;
            segLoopActive = false;
            if (qwenIntervalId) { clearInterval(qwenIntervalId); qwenIntervalId = null; }
            startButton.textContent = 'Iniciar';
            startButton.className   = 'start';
            segCanvas.getContext('2d').clearRect(0, 0, segCanvas.width, segCanvas.height);
            segStatus.textContent = 'Pausado';
        }

        startButton.addEventListener('click', () => {
            isProcessing ? handleStop() : handleStart();
        });

        // ── Init ─────────────────────────────────────────────────────────────
        window.addEventListener('DOMContentLoaded', async () => {
            await initCamera();

            video.addEventListener('loadedmetadata', () => {
                segCanvas.width  = video.videoWidth;
                segCanvas.height = video.videoHeight;
            });

            try {
                const vision = await FilesetResolver.forVisionTasks(
                    'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm'
                );
                imageSegmenter = await ImageSegmenter.createFromOptions(vision, {
                    baseOptions: {
                        modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/image_segmenter/deeplab_v3/float32/1/deeplab_v3.tflite',
                        delegate: 'GPU'
                    },
                    runningMode: 'VIDEO',
                    outputCategoryMask: true,
                    outputConfidenceMasks: false
                });
                segStatus.textContent = 'Segmentador listo';
                if (isProcessing) requestAnimationFrame(segLoop);
            } catch (e) {
                console.warn('[Seg] No disponible:', e.message);
                segStatus.style.display = 'none';
            }
        });

        window.addEventListener('beforeunload', () => {
            if (stream) stream.getTracks().forEach(t => t.stop());
            if (qwenIntervalId) clearInterval(qwenIntervalId);
        });
    </script>
</body>
</html>
