<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PathsAI</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Nunito', sans-serif;
            background: #FFFFFF;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .mobile-container {
            width: 100%;
            max-width: 375px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 24px;
        }

        .logo-area {
            text-align: center;
            margin-bottom: 60px;
        }

        .logo {
            width: 100px;
            height: 100px;
            margin-bottom: 16px;
            border-radius: 50%;
            background: white;
            padding: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
        }

        h1 {
            font-size: 36px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        h1 .paths { color: #4A90D9; }
        h1 .ai    { color: #FF9500; }

        .buttons-area {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .option-btn {
            width: 100%;
            height: 140px;
            border: none;
            border-radius: 24px;
            font-family: 'Nunito', sans-serif;
            color: white;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
            transition: transform 0.15s ease;
            text-decoration: none;
        }

        .option-btn:active { transform: scale(0.96); }

        .camera-btn  { background: #FF9500; }
        .route-btn   { background: #34C759; }

        .btn-icon { font-size: 48px; }
        .btn-text { font-size: 22px; font-weight: 800; letter-spacing: 0.3px; }

        @media (min-width: 376px) {
            .mobile-container {
                border-radius: 40px;
                height: 812px;
                box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            }
        }
    </style>
</head>
<body>
    <div class="mobile-container">
        <div class="logo-area">
            <img src="logo.png" alt="PathsAI" class="logo">
            <h1><span class="paths">Paths</span><span class="ai">AI</span></h1>
        </div>

        <div class="buttons-area">
            <a class="option-btn camera-btn" href="camera.html">
                <div class="btn-icon">👓</div>
                <div class="btn-text">Solo Cámara</div>
            </a>

            <a class="option-btn route-btn" href="navigation.html">
                <div class="btn-icon">🗺️</div>
                <div class="btn-text">Ruta Guiada</div>
            </a>
        </div>
    </div>
</body>
</html>
