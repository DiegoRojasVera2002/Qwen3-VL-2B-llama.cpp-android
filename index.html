<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PathsAI</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, sans-serif;
            background: #0d0d0d;
            color: #e0e0e0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            padding: 16px;
            min-height: 100vh;
        }

        h1 { font-size: 22px; color: #fff; letter-spacing: 1px; margin-top: 4px; }
        h1 span { color: #4ade80; }

        #videoContainer {
            position: relative;
            width: 100%;
            max-width: 640px;
            border-radius: 12px;
            overflow: hidden;
            background: #000;
            border: 2px solid #222;
        }

        #videoFeed {
            display: block;
            width: 100%;
            height: auto;
        }

        #segCanvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
        }

        #segStatus {
            position: absolute;
            bottom: 8px; left: 8px;
            background: rgba(0,0,0,0.75);
            font-size: 11px;
            font-family: monospace;
            padding: 3px 8px;
            border-radius: 4px;
            color: #4ade80;
        }

        #captureCanvas { display: none; }

        #responseBox {
            width: 100%;
            max-width: 640px;
            background: #111827;
            border: 1px solid #1f2937;
            border-radius: 10px;
            padding: 12px 16px;
            font-size: 14px;
            line-height: 1.6;
            min-height: 70px;
            color: #d1fae5;
        }

        .controls-row {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
            max-width: 640px;
        }

        #startButton {
            padding: 10px 28px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
        }

        #startButton.start { background: #16a34a; color: #fff; }
        #startButton.stop  { background: #dc2626; color: #fff; }

        select, input[type=range] {
            background: #1a1a1a;
            color: #e0e0e0;
            border: 1px solid #333;
            border-radius: 6px;
            padding: 5px 8px;
        }

        label { font-size: 13px; color: #9ca3af; }

        details { width: 100%; max-width: 640px; }

        summary {
            cursor: pointer;
            color: #6b7280;
            font-size: 13px;
            padding: 6px;
            user-select: none;
        }

        .settings-box {
            background: #111;
            border: 1px solid #222;
            border-radius: 8px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 6px;
        }

        input[type=text] {
            background: #1a1a1a;
            color: #e0e0e0;
            border: 1px solid #333;
            border-radius: 6px;
            padding: 6px 8px;
            width: 100%;
            font-size: 13px;
        }

        textarea {
            background: #1a1a1a;
            color: #e0e0e0;
            border: 1px solid #333;
            border-radius: 6px;
            padding: 8px;
            width: 100%;
            font-size: 12px;
            height: 120px;
            resize: vertical;
        }
    </style>
</head>
<body>

    <h1>Paths<span>AI</span></h1>

    <div id="videoContainer">
        <video id="videoFeed" autoplay playsinline muted></video>
        <canvas id="segCanvas"></canvas>
        <div id="segStatus">⏳ Cargando segmentador...</div>
    </div>

    <canvas id="captureCanvas"></canvas>

    <div id="responseBox">Iniciando PathsAI...</div>

    <div class="controls-row">
        <label>Qwen cada:
            <select id="intervalSelect">
                <option value="1000">1s</option>
                <option value="2000">2s</option>
                <option value="3000" selected>3s</option>
                <option value="5000">5s</option>
                <option value="10000">10s</option>
            </select>
        </label>
        <label><input type="checkbox" id="ttsEnabled"> TTS</label>
        <label>Vel:
            <input type="range" id="ttsRate" min="0.5" max="2" step="0.1" value="1.2" style="width:70px">
            <span id="ttsRateLabel">1.2</span>
        </label>
        <button id="startButton" class="start">Iniciar</button>
    </div>

    <details>
        <summary>⚙️ Configuración avanzada</summary>
        <div class="settings-box">
            <label>API Qwen:<br>
                <input type="text" id="baseURL" value="http://localhost:8080">
            </label>
            <label>Idioma TTS:
                <select id="ttsLang">
                    <option value="es-MX">Español (México)</option>
                    <option value="es-ES">Español (España)</option>
                    <option value="en-US">English (US)</option>
                </select>
            </label>
            <label>Prompt:<br>
                <textarea id="instructionText"></textarea>
            </label>
        </div>
    </details>

    <script type="module">
        import { ImageSegmenter, FilesetResolver }
            from 'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14';

        // ── Paleta de colores suaves para 21 clases DeepLab v3 (Pascal VOC) ──
        // Índice 0 = background → transparente
        // prettier-ignore
        const PALETTE = new Uint8ClampedArray([
          //  R    G    B    A
              0,   0,   0,   0,   // 0  background
            220, 120,  80, 130,   // 1  aeroplane
            100, 210, 160, 130,   // 2  bicycle
            240, 190,  80, 130,   // 3  bird
             90, 150, 230, 130,   // 4  boat
            230, 140,  90, 130,   // 5  bottle
            170,  90, 230, 130,   // 6  bus
             90, 200,  90, 130,   // 7  car
            240, 130, 190, 130,   // 8  cat
            200, 200,  80, 130,   // 9  chair
            120, 230, 190, 130,   // 10 cow
            240, 170, 120, 130,   // 11 diningtable
            190, 120, 230, 130,   // 12 dog
            240, 210, 120, 130,   // 13 horse
            120, 200, 240, 130,   // 14 motorbike
            240,  90,  90, 155,   // 15 person  (más visible, es obstáculo)
             90, 230, 130, 130,   // 16 pottedplant
            240, 190, 190, 130,   // 17 sheep
            200, 170, 130, 130,   // 18 sofa
            130, 130, 230, 130,   // 19 train
            240, 240, 120, 130,   // 20 tvmonitor
        ]);

        // ── DOM ──────────────────────────────────────────────────────────────
        const video           = document.getElementById('videoFeed');
        const segCanvas       = document.getElementById('segCanvas');
        const captureCanvas   = document.getElementById('captureCanvas');
        const segStatus       = document.getElementById('segStatus');
        const responseBox     = document.getElementById('responseBox');
        const baseURL         = document.getElementById('baseURL');
        const instructionText = document.getElementById('instructionText');
        const intervalSelect  = document.getElementById('intervalSelect');
        const startButton     = document.getElementById('startButton');
        const ttsEnabled      = document.getElementById('ttsEnabled');
        const ttsLang         = document.getElementById('ttsLang');
        const ttsRate         = document.getElementById('ttsRate');
        const ttsRateLabel    = document.getElementById('ttsRateLabel');

        // ── Estado ───────────────────────────────────────────────────────────
        let stream         = null;
        let isProcessing   = false;
        let qwenIntervalId = null;
        let segLoopActive  = false;
        let imageSegmenter = null;
        let lastVideoTime  = -1;
        let frameCount     = 0;
        let fpsTimer       = performance.now();

        // Canvas auxiliar reutilizable para escalar la máscara
        const tmpCanvas = document.createElement('canvas');
        const tmpCtx    = tmpCanvas.getContext('2d', { willReadFrequently: false });

        // ── Prompt ───────────────────────────────────────────────────────────
        instructionText.value = `Eres PathsAI, los ojos de una persona ciega que está caminando. Analiza la imagen y responde SIEMPRE en español con máximo 3 frases cortas y directas. Tu respuesta debe tener SIEMPRE esta estructura:

PRIMERO — Describe brevemente qué hay adelante: el entorno, espacio o contexto general. Ejemplo: "Estás en un pasillo.", "Hay una sala con muebles.", "Estás frente a una puerta.", "Hay una calle con personas."

SEGUNDO — Si hay obstáculos, personas o peligros: indica qué es, dónde está (izquierda, derecha, adelante, al centro) y qué tan cerca (muy cerca <1m, cerca 1-2m, a distancia >3m). Ejemplo: "Silla al centro, muy cerca." / "Persona a la derecha, cerca." / "Grupo de personas adelante, a distancia."

TERCERO — Da una instrucción de movimiento directa y accionable: "Gira a la izquierda.", "Desvíate a la derecha.", "Detente.", "Continúa adelante con precaución.", "Cambia de ruta, hay tumulto al frente."

Si no hay obstáculos ni peligros: "Camino despejado, continúa adelante."`;

        // ── TTS ──────────────────────────────────────────────────────────────
        ttsRate.addEventListener('input', () => {
            ttsRateLabel.textContent = parseFloat(ttsRate.value).toFixed(1);
        });

        setInterval(() => {
            if (window.speechSynthesis.speaking) window.speechSynthesis.resume();
        }, 5000);

        window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();

        function speak(text) {
            if (!ttsEnabled.checked || !text) return;
            window.speechSynthesis.cancel();
            const utt = new SpeechSynthesisUtterance(text);
            utt.lang = ttsLang.value;
            utt.rate = parseFloat(ttsRate.value);
            const voices = window.speechSynthesis.getVoices();
            const match = voices.find(v => v.lang === ttsLang.value)
                       || voices.find(v => v.lang.startsWith(ttsLang.value.split('-')[0]));
            if (match) utt.voice = match;
            utt.onerror = e => console.error('[TTS]', e.error);
            window.speechSynthesis.speak(utt);
        }

        // ── Cámara ───────────────────────────────────────────────────────────
        async function initCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: { ideal: 'environment' } },
                    audio: false
                });
                video.srcObject = stream;
                responseBox.textContent = 'Cámara lista. Presiona Iniciar.';
            } catch (err) {
                responseBox.textContent = `Error cámara: ${err.message}`;
            }
        }

        function captureDataURL() {
            if (!stream || !video.videoWidth) return null;
            captureCanvas.width  = video.videoWidth;
            captureCanvas.height = video.videoHeight;
            captureCanvas.getContext('2d').drawImage(video, 0, 0);
            return captureCanvas.toDataURL('image/jpeg', 0.75);
        }

        // ── Dibujar máscara de categorías ────────────────────────────────────
        function drawMask(result) {
            const mask = result.categoryMask;
            if (!mask) return;

            const mw   = mask.width;
            const mh   = mask.height;
            const data = mask.getAsUint8Array();

            // Redimensionar tmpCanvas si cambia la resolución
            if (tmpCanvas.width !== mw || tmpCanvas.height !== mh) {
                tmpCanvas.width  = mw;
                tmpCanvas.height = mh;
            }

            const imgData = tmpCtx.createImageData(mw, mh);
            const pix     = imgData.data;

            // Mapeo rápido: índice de clase → color de PALETTE
            for (let i = 0; i < data.length; i++) {
                const c      = data[i] * 4;
                pix[i * 4]   = PALETTE[c];
                pix[i * 4+1] = PALETTE[c+1];
                pix[i * 4+2] = PALETTE[c+2];
                pix[i * 4+3] = PALETTE[c+3];
            }

            tmpCtx.putImageData(imgData, 0, 0);

            // Escalar la máscara al tamaño del canvas overlay con suavizado
            const ctx = segCanvas.getContext('2d');
            ctx.clearRect(0, 0, segCanvas.width, segCanvas.height);
            ctx.imageSmoothingEnabled = true;
            ctx.imageSmoothingQuality = 'medium';
            ctx.drawImage(tmpCanvas, 0, 0, segCanvas.width, segCanvas.height);
        }

        // ── Loop de segmentación (RAF — tan rápido como el GPU permita) ──────
        function segLoop(timestamp) {
            if (!segLoopActive) return;
            requestAnimationFrame(segLoop);

            if (video.readyState < 2 || video.currentTime === lastVideoTime) return;
            lastVideoTime = video.currentTime;

            imageSegmenter.segmentForVideo(video, timestamp, (result) => {
                drawMask(result);
                result.close();

                // FPS counter
                frameCount++;
                const now = performance.now();
                if (now - fpsTimer >= 1000) {
                    segStatus.textContent = `🟢 ${frameCount} FPS`;
                    frameCount = 0;
                    fpsTimer   = now;
                }
            });
        }

        // ── Inferencia Qwen ──────────────────────────────────────────────────
        async function sendToQwen() {
            if (!isProcessing) return;
            const dataURL = captureDataURL();
            if (!dataURL) return;

            try {
                const res = await fetch(`${baseURL.value}/v1/chat/completions`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        max_tokens: 100,
                        messages: [{
                            role: 'user',
                            content: [
                                { type: 'text', text: instructionText.value },
                                { type: 'image_url', image_url: { url: dataURL } }
                            ]
                        }]
                    })
                });
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const data = await res.json();
                const text = data.choices[0].message.content;
                responseBox.textContent = text;
                speak(text);
            } catch (e) {
                responseBox.textContent = `Error Qwen: ${e.message}`;
            }
        }

        // ── Controles ────────────────────────────────────────────────────────
        function handleStart() {
            if (!stream) { alert('Cámara no disponible'); return; }
            isProcessing  = true;
            segLoopActive = true;

            segCanvas.width  = video.videoWidth  || 640;
            segCanvas.height = video.videoHeight || 480;

            startButton.textContent = 'Detener';
            startButton.className   = 'stop';

            sendToQwen();
            qwenIntervalId = setInterval(sendToQwen, parseInt(intervalSelect.value));

            if (imageSegmenter) requestAnimationFrame(segLoop);
        }

        function handleStop() {
            isProcessing  = false;
            segLoopActive = false;
            if (qwenIntervalId) { clearInterval(qwenIntervalId); qwenIntervalId = null; }

            startButton.textContent = 'Iniciar';
            startButton.className   = 'start';
            segCanvas.getContext('2d').clearRect(0, 0, segCanvas.width, segCanvas.height);
            segStatus.textContent = '⏸️ Pausado';
        }

        startButton.addEventListener('click', () => {
            isProcessing ? handleStop() : handleStart();
        });

        // ── Init ─────────────────────────────────────────────────────────────
        window.addEventListener('DOMContentLoaded', async () => {
            await initCamera();

            video.addEventListener('loadedmetadata', () => {
                segCanvas.width  = video.videoWidth;
                segCanvas.height = video.videoHeight;
            });

            // Carga MediaPipe DeepLab v3
            // Primera vez: descarga ~15MB (necesita internet una vez, luego offline)
            try {
                const vision = await FilesetResolver.forVisionTasks(
                    'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm'
                );

                imageSegmenter = await ImageSegmenter.createFromOptions(vision, {
                    baseOptions: {
                        modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/image_segmenter/deeplab_v3/float32/1/deeplab_v3.tflite',
                        delegate: 'GPU'
                    },
                    runningMode: 'VIDEO',
                    outputCategoryMask: true,
                    outputConfidenceMasks: false
                });

                segStatus.textContent = '✅ Segmentador listo (GPU)';
                if (isProcessing) requestAnimationFrame(segLoop);
            } catch (e) {
                segStatus.textContent = `⚠️ Sin segmentación: ${e.message}`;
                console.error(e);
            }
        });

        window.addEventListener('beforeunload', () => {
            if (stream) stream.getTracks().forEach(t => t.stop());
            if (qwenIntervalId) clearInterval(qwenIntervalId);
        });

    </script>
</body>
</html>
